<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Ishana">
<link rel="apple-touch-icon" href="icon192.png">
<link rel="apple-touch-icon" sizes="180x180" href="icon192.png">
<meta name="theme-color" content="#1C1917">
<title>Ishana — Reinvention</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
:root {
  --cream:#FAF7F2;--warm:#FDF9F4;--ink:#1C1917;--ink2:#44403C;--ink3:#78716C;
  --gold:#B08D57;--gold-l:#E8D9C0;--gold-p:#F5EFE3;
  --rose:#C4757A;--rose-l:#F0D9DA;
  --sage:#7A9E7E;--sage-l:#DDE9DE;
  --slate:#6B7A8D;--slate-l:#DBE1E9;
  --lavender:#9B8DBF;--lavender-l:#EAE5F5;
  --bdr:rgba(176,141,87,0.18);
  --st:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{font-family:"DM Sans",sans-serif;background:var(--cream);color:var(--ink);display:flex;flex-direction:column;height:100%;height:-webkit-fill-available;}
.hdr{padding:calc(var(--st) + 12px) 18px 10px;background:var(--warm);border-bottom:1px solid var(--bdr);flex-shrink:0;display:flex;align-items:center;justify-content:space-between;}
.hdr h1{font-family:"Cormorant Garamond",serif;font-size:1.35rem;font-weight:300;line-height:1;}
.hdr h1 em{color:var(--gold);font-style:italic;}
.hdr-sub{font-size:9.5px;color:var(--ink3);letter-spacing:.07em;text-transform:uppercase;margin-top:2px;}
.hdr-r{text-align:right;}
.hdr-day{font-size:11px;color:var(--gold);letter-spacing:.08em;text-transform:uppercase;font-weight:500;font-family:"Cormorant Garamond",serif;}
.hdr-date{font-size:10px;color:var(--ink3);margin-top:1px;}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 14px calc(72px + var(--sb));}
.bnav{padding:0 0 var(--sb);background:var(--warm);border-top:1px solid var(--bdr);display:flex;flex-shrink:0;}
.bni{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:7px 2px;font-size:8.5px;color:var(--ink3);cursor:pointer;letter-spacing:.04em;text-transform:uppercase;gap:3px;-webkit-user-select:none;transition:color .15s;}
.bni svg{width:19px;height:19px;stroke:currentColor;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;}
.bni.active{color:var(--gold);}
.card{background:var(--warm);border:1px solid var(--bdr);border-radius:14px;padding:14px;margin-bottom:10px;}
.card-title{font-family:"Cormorant Garamond",serif;font-size:1rem;font-weight:500;color:var(--ink);margin-bottom:9px;}
.card-text{font-size:12.5px;color:var(--ink2);line-height:1.7;}
.pg-hdr{margin-bottom:14px;}
.pg-title{font-family:"Cormorant Garamond",serif;font-size:1.45rem;font-weight:300;}
.pg-title em{color:var(--gold);font-style:italic;}
.pg-sub{font-size:11px;color:var(--ink3);margin-top:3px;line-height:1.5;}
.day-note{background:linear-gradient(135deg,var(--rose-l),var(--gold-p));border-radius:10px;padding:11px 13px;margin-bottom:10px;font-size:12px;color:var(--ink2);font-style:italic;line-height:1.6;border:1px solid var(--bdr);}
.tl-item{display:flex;gap:10px;padding:8px 6px;border-bottom:1px solid rgba(176,141,87,.1);border-radius:8px;align-items:flex-start;}
.tl-item:active{background:var(--gold-p);}
.tl-item:last-child{border-bottom:none;}
.tl-time{font-size:10.5px;font-weight:500;color:var(--ink3);min-width:46px;padding-top:2px;}
.tl-body{flex:1;}
.tl-text{font-size:12.5px;color:var(--ink);line-height:1.4;margin-bottom:3px;}
.tag{display:inline-block;font-size:8.5px;padding:1px 6px;border-radius:20px;font-weight:500;letter-spacing:.04em;text-transform:uppercase;margin-right:2px;}
.tg{background:var(--gold-p);color:var(--gold);}
.tr{background:var(--rose-l);color:var(--rose);}
.ts{background:var(--slate-l);color:var(--slate);}
.tsa{background:var(--sage-l);color:var(--sage);}
.days{display:flex;gap:5px;overflow-x:auto;-webkit-overflow-scrolling:touch;margin-bottom:12px;padding-bottom:2px;}
.days::-webkit-scrollbar{display:none;}
.db{flex-shrink:0;padding:4px 12px;border-radius:20px;border:1px solid var(--bdr);background:var(--warm);font-size:11px;font-weight:500;color:var(--ink3);cursor:pointer;-webkit-user-select:none;}
.db.active{background:var(--gold);color:white;border-color:var(--gold);}
.tabs{display:flex;gap:5px;margin-bottom:11px;flex-wrap:wrap;}
.tab{font-size:10px;padding:4px 11px;border-radius:20px;border:1px solid var(--bdr);background:var(--warm);color:var(--ink3);cursor:pointer;letter-spacing:.04em;text-transform:uppercase;font-weight:500;-webkit-user-select:none;}
.tab.active{background:var(--rose);color:white;border-color:var(--rose);}
.row{display:flex;gap:9px;padding:6px 0;border-bottom:1px solid rgba(176,141,87,.1);font-size:12px;color:var(--ink2);line-height:1.55;align-items:flex-start;}
.row:last-child{border-bottom:none;}
.dot{width:5px;height:5px;border-radius:50%;background:var(--gold);margin-top:5px;flex-shrink:0;}
.dot-r{background:var(--rose);}
.dot-s{background:var(--sage);}
.dot-lv{background:var(--lavender);}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:10px;}
.mc{background:var(--warm);border:1px solid var(--bdr);border-radius:10px;padding:11px;}
.mc-t{font-family:"Cormorant Garamond",serif;font-size:.9rem;font-weight:500;color:var(--ink);margin-bottom:3px;}
.mc-d{font-size:11px;color:var(--ink2);line-height:1.5;}
.quote{background:var(--gold-p);border-left:3px solid var(--gold);border-radius:0 10px 10px 0;padding:11px 13px;margin-bottom:10px;}
.q-text{font-family:"Cormorant Garamond",serif;font-size:.95rem;font-style:italic;color:var(--ink);line-height:1.6;}
.q-attr{font-size:9.5px;color:var(--gold);margin-top:5px;letter-spacing:.07em;text-transform:uppercase;font-weight:500;}
.wh{background:linear-gradient(135deg,var(--sage-l),var(--gold-p));border-radius:10px;padding:13px;margin-bottom:10px;border:1px solid var(--bdr);}
.wh-t{font-family:"Cormorant Garamond",serif;font-size:1.15rem;font-weight:500;}
.wh-f{font-size:11px;color:var(--sage);font-style:italic;margin-top:2px;}
.ss{display:flex;gap:11px;padding:9px 0;border-bottom:1px solid rgba(176,141,87,.1);align-items:flex-start;}
.ss:last-child{border-bottom:none;}
.ss-n{width:22px;height:22px;border-radius:50%;background:var(--rose-l);color:var(--rose);font-size:9.5px;font-weight:500;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.ss-name{font-size:12.5px;font-weight:500;color:var(--ink);}
.ss-prod{font-size:11px;color:var(--rose);font-style:italic;margin-bottom:1px;}
.ss-why{font-size:10.5px;color:var(--ink3);line-height:1.45;}
.ob{border-left:3px solid var(--rose);padding:11px 13px;background:var(--warm);border-radius:0 10px 10px 0;margin-bottom:9px;border-top:1px solid var(--bdr);border-right:1px solid var(--bdr);border-bottom:1px solid var(--bdr);}
.ob-week{font-size:9.5px;color:var(--ink3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:4px;}
.ob-day{font-family:"Cormorant Garamond",serif;font-size:.95rem;font-weight:500;}
.ob-vibe{font-size:10px;color:var(--rose);font-style:italic;margin:2px 0 7px;}
.bk{display:flex;gap:11px;padding:10px 0;border-bottom:1px solid rgba(176,141,87,.1);align-items:flex-start;}
.bk:last-child{border-bottom:none;}
.bk-spine{width:5px;border-radius:3px;background:var(--gold);flex-shrink:0;align-self:stretch;min-height:34px;}
.bk-t{font-family:"Cormorant Garamond",serif;font-size:.9rem;font-weight:500;}
.bk-a{font-size:9.5px;color:var(--gold);letter-spacing:.05em;text-transform:uppercase;margin:2px 0;}
.bk-n{font-size:11px;color:var(--ink2);line-height:1.5;}
.icard{background:linear-gradient(135deg,var(--gold-p),var(--rose-l));border:1px solid var(--bdr);border-radius:10px;padding:13px 15px;margin-bottom:7px;font-family:"Cormorant Garamond",serif;font-size:.95rem;font-style:italic;color:var(--ink);line-height:1.6;}
.dr{display:flex;gap:11px;padding:10px 0;border-bottom:1px solid rgba(176,141,87,.1);align-items:flex-start;}
.dr:last-child{border-bottom:none;}
.dr-n{font-family:"Cormorant Garamond",serif;font-size:1.2rem;color:var(--gold);min-width:24px;line-height:1;margin-top:2px;}
.dr-r{font-size:12.5px;font-weight:500;color:var(--ink);margin-bottom:2px;}
.dr-d{font-size:11px;color:var(--ink2);line-height:1.55;}
.pc{background:var(--gold-p);border:1px solid var(--gold-l);border-radius:10px;padding:11px 13px;margin-bottom:9px;}
.pc-d{font-family:"Cormorant Garamond",serif;font-size:.95rem;font-weight:500;color:var(--gold);margin-bottom:2px;}
.pc-f{font-size:10px;color:var(--ink3);font-style:italic;margin-bottom:5px;}
.pc-t{font-size:12px;color:var(--ink2);line-height:1.55;}
.ci{display:flex;gap:9px;align-items:flex-start;padding:7px 0;border-bottom:1px solid rgba(176,141,87,.1);font-size:12.5px;color:var(--ink2);cursor:pointer;-webkit-user-select:none;}
.ci:last-child{border-bottom:none;}
.ci.ck{color:var(--ink3);text-decoration:line-through;}
.cb{width:17px;height:17px;border-radius:4px;border:1.5px solid var(--gold);flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:1px;transition:all .15s;}
.ci.ck .cb{background:var(--gold);border-color:var(--gold);}
.ci.ck .cb::after{content:"checkmark";font-size:10px;color:white;content:"\2713";}
.hrow{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid rgba(176,141,87,.1);}
.hrow:last-child{border-bottom:none;}
.hname{font-size:12.5px;color:var(--ink);}
.hdot{width:21px;height:21px;border-radius:50%;border:1.5px solid var(--bdr);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:9px;color:transparent;transition:all .15s;-webkit-user-select:none;flex-shrink:0;}
.hdot.done{background:var(--gold);border-color:var(--gold);color:white;}
.hdot.done::after{content:"\2713";}
.period-cal{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:12px;}
.pcal-head{font-size:9.5px;font-weight:500;color:var(--ink3);text-align:center;padding:4px 0;}
.pcal-day{aspect-ratio:1;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;cursor:pointer;-webkit-user-select:none;transition:all .15s;border:1.5px solid transparent;color:var(--ink2);}
.pcal-day.today{border-color:var(--gold);color:var(--gold);font-weight:500;}
.pcal-day.period{background:var(--rose);color:white;border-color:var(--rose);}
.pcal-day.fertile{background:var(--sage-l);color:var(--sage);}
.pcal-day.spotting{background:var(--lavender-l);color:var(--lavender);}
.period-legend{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px;}
.pl{display:flex;align-items:center;gap:5px;font-size:10.5px;color:var(--ink3);}
.pl-dot{width:10px;height:10px;border-radius:50%;}
.ps-num{font-family:"Cormorant Garamond",serif;font-size:1.5rem;color:var(--ink);font-weight:300;}
.ps-label{font-size:10px;color:var(--ink3);text-transform:uppercase;letter-spacing:.05em;}
.log-btn{background:var(--rose);color:white;border:none;border-radius:20px;padding:8px 18px;font-size:12px;font-family:"DM Sans",sans-serif;cursor:pointer;font-weight:500;}
.log-btn.sec{background:var(--warm);color:var(--rose);border:1px solid var(--rose);}
.month-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.month-title{font-family:"Cormorant Garamond",serif;font-size:1.2rem;font-weight:400;}
.mnav-btn{background:none;border:1px solid var(--bdr);border-radius:50%;width:30px;height:30px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--ink3);font-size:14px;}
.month-cal{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:12px;}
.mday-head{font-size:9px;font-weight:500;color:var(--ink3);text-align:center;padding:3px 0;}
.mday{min-height:42px;border-radius:8px;padding:4px;cursor:pointer;border:1px solid transparent;transition:background .15s;background:var(--warm);}
.mday:active{background:var(--gold-p);}
.mday.other{opacity:.3;}
.mday.today .mnum{background:var(--gold);color:white;border-radius:50%;width:19px;height:19px;display:flex;align-items:center;justify-content:center;}
.mnum{font-size:11px;font-weight:500;color:var(--ink);width:19px;height:19px;display:flex;align-items:center;justify-content:center;}
.mchip{font-size:8.5px;padding:1px 4px;border-radius:3px;margin-top:1px;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mdot{width:4px;height:4px;border-radius:50%;margin:2px auto 0;}
.modal-bg{position:fixed;inset:0;background:rgba(28,25,23,.55);z-index:700;display:flex;align-items:flex-end;}
.modal{background:var(--warm);border-radius:20px 20px 0 0;width:100%;padding:20px 18px calc(20px + var(--sb));max-height:85vh;overflow-y:auto;}
.modal-title{font-family:"Cormorant Garamond",serif;font-size:1.2rem;font-weight:500;margin-bottom:14px;}
.modal input,.modal textarea,.modal select{width:100%;border:1px solid var(--bdr);border-radius:10px;padding:10px 13px;font-size:13px;font-family:"DM Sans",sans-serif;background:var(--cream);color:var(--ink);margin-bottom:10px;outline:none;-webkit-appearance:none;}
.modal input:focus,.modal textarea:focus,.modal select:focus{border-color:var(--gold);}
.modal textarea{resize:none;height:70px;}
.modal-btns{display:flex;gap:9px;margin-top:4px;}
.btn-p{flex:1;background:var(--ink);color:var(--gold-l);border:none;border-radius:20px;padding:11px;font-size:13px;font-family:"DM Sans",sans-serif;cursor:pointer;font-weight:500;}
.btn-s{flex:1;background:var(--warm);color:var(--ink3);border:1px solid var(--bdr);border-radius:20px;padding:11px;font-size:13px;font-family:"DM Sans",sans-serif;cursor:pointer;}
.color-picker{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;}
.color-opt{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .15s;-webkit-user-select:none;}
.color-opt.sel{border-color:var(--ink);}
.sl{font-size:10px;font-weight:500;letter-spacing:.07em;text-transform:uppercase;color:var(--ink3);margin-bottom:8px;}
.chat-fab{position:fixed;bottom:calc(72px + var(--sb) + 14px);right:16px;width:50px;height:50px;border-radius:50%;background:var(--ink);color:var(--gold);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 18px rgba(28,25,23,.3);z-index:500;font-family:"Cormorant Garamond",serif;font-size:1.1rem;font-style:italic;transition:transform .2s;-webkit-user-select:none;}
.chat-fab:active{transform:scale(.92);}
.chat-sheet{position:fixed;inset:0;z-index:600;display:flex;flex-direction:column;background:var(--cream);transform:translateY(100%);transition:transform .35s cubic-bezier(.32,.72,0,1);}
.chat-sheet.open{transform:translateY(0);}
.chat-top{background:var(--ink);flex-shrink:0;padding:calc(var(--st) + 10px) 16px 0;}
.chat-top-bar{display:flex;align-items:center;justify-content:space-between;padding-bottom:0;}
.chat-top-bar h2{font-family:"Cormorant Garamond",serif;font-size:1.1rem;font-weight:400;color:var(--gold);}
.chat-actions{display:flex;gap:7px;align-items:center;}
.cib{background:none;border:1px solid rgba(176,141,87,.3);border-radius:20px;padding:4px 10px;color:rgba(176,141,87,.7);font-size:11px;cursor:pointer;font-family:"DM Sans",sans-serif;}
.c-close{background:none;border:none;color:rgba(176,141,87,.5);font-size:1.2rem;cursor:pointer;padding:4px;line-height:1;}
.chat-convo-name{font-size:10.5px;color:rgba(176,141,87,.5);padding:6px 0 8px;text-align:center;font-style:italic;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.convos-view{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px;}
.convo-item{display:flex;gap:11px;padding:11px 12px;border-radius:10px;border:1px solid var(--bdr);background:var(--warm);margin-bottom:8px;cursor:pointer;align-items:flex-start;}
.convo-item.cur{border-color:var(--gold);background:var(--gold-p);}
.c-av{width:34px;height:34px;border-radius:50%;background:var(--ink);color:var(--gold);display:flex;align-items:center;justify-content:center;font-family:"Cormorant Garamond",serif;font-size:.9rem;font-style:italic;flex-shrink:0;}
.c-meta{flex:1;min-width:0;}
.c-title{font-size:13px;font-weight:500;color:var(--ink);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.c-preview{font-size:11px;color:var(--ink3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.c-time{font-size:10px;color:var(--ink3);flex-shrink:0;margin-top:1px;}
.new-c-btn{display:flex;align-items:center;gap:8px;padding:11px 14px;border-radius:10px;border:1px dashed var(--gold-l);background:transparent;color:var(--gold);font-size:13px;font-family:"DM Sans",sans-serif;cursor:pointer;width:100%;margin-bottom:8px;}
.active-chat{display:flex;flex-direction:column;flex:1;min-height:0;overflow:hidden;}
.chat-msgs{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px;display:flex;flex-direction:column;gap:10px;}
.msg{display:flex;gap:7px;max-width:88%;align-items:flex-end;}
.msg.user{align-self:flex-end;flex-direction:row-reverse;}
.msg.assistant{align-self:flex-start;}
.msg-av{width:26px;height:26px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;}
.msg.assistant .msg-av{background:var(--ink);color:var(--gold);font-family:"Cormorant Garamond",serif;font-style:italic;}
.msg.user .msg-av{background:var(--gold-p);color:var(--gold);}
.msg-bub{padding:9px 13px;border-radius:14px;font-size:12.5px;line-height:1.6;}
.msg.assistant .msg-bub{background:var(--warm);border:1px solid var(--bdr);color:var(--ink2);border-bottom-left-radius:3px;}
.msg.user .msg-bub{background:var(--ink);color:var(--gold-l);border-bottom-right-radius:3px;}
.typing-bub{display:flex;gap:4px;align-items:center;padding:10px 13px;}
.td{width:6px;height:6px;border-radius:50%;background:var(--ink3);animation:tp 1.2s infinite;}
.td:nth-child(2){animation-delay:.2s;}
.td:nth-child(3){animation-delay:.4s;}
@keyframes tp{0%,60%,100%{opacity:.3;transform:scale(.8);}30%{opacity:1;transform:scale(1);}}
.chat-input-area{padding:10px 14px calc(10px + var(--sb));background:var(--warm);border-top:1px solid var(--bdr);display:flex;gap:8px;align-items:flex-end;flex-shrink:0;}
.chat-input{flex:1;border:1px solid var(--bdr);border-radius:18px;padding:9px 14px;font-size:13px;font-family:"DM Sans",sans-serif;background:var(--cream);color:var(--ink);resize:none;max-height:90px;outline:none;line-height:1.4;}
.chat-input:focus{border-color:var(--gold);}
.send-btn{width:36px;height:36px;border-radius:50%;background:var(--ink);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.send-btn:active{background:var(--ink2);}
.send-btn:disabled{opacity:.35;}
.send-btn svg{width:15px;height:15px;stroke:var(--gold);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.pg{animation:fadeUp .25s ease;}
</style>
</head>
<body>

<div class="hdr">
  <div>
    <h1>Ishana's <em>Reinvention</em></h1>
    <div class="hdr-sub">Your complete guide</div>
  </div>
  <div class="hdr-r">
    <div class="hdr-day" id="hdrDay"></div>
    <div class="hdr-date" id="hdrDate"></div>
  </div>
</div>

<div class="scroll" id="scroll"><div id="content" class="pg"></div></div>

function ls(k, d) { try { var v = localStorage.getItem(k); return v !== null ? JSON.parse(v) : d; } catch(e) { return d; } }
function lsSet(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch(e) {} }
function getHabits(d) { return ls("h_" + d.toISOString().slice(0,10), {}); }
function setHabit(ds, k, v) { var h = ls("h_" + ds, {}); h[k] = v; lsSet("h_" + ds, h); }
function getEvents() { return ls("events", []); }
function saveEvents(e) { lsSet("events", e); }
function getPeriod() { return ls("period", {}); }
function savePeriod(d) { lsSet("period", d); }
function getConvos() { return ls("convos", []); }
function saveConvos(c) { lsSet("convos", c); }
function getChecked() { return ls("bagCk", {}); }

function tags(gs) {
  return gs.map(function(g) { return '<span class="tag ' + (TMAP[g]||"tg") + '">' + (TLBL[g]||g) + "</span>"; }).join("");
}

function todayName() { return DAYS[new Date().getDay()]; }
function todayStr() { return new Date().toISOString().slice(0,10); }
function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function fmtDate(d) { return d.getDate() + " " + MONTHS[d.getMonth()] + " " + d.getFullYear(); }
function fmtConvoTime(iso) {
  var d = new Date(iso), now = new Date(), diff = (now - d) / 86400000;
  if (diff < 1) return d.toLocaleTimeString([], {hour:"2-digit",minute:"2-digit"});
  if (diff < 7) return DAYS[d.getDay()].slice(0,3);
  return d.getDate() + " " + MONTHS[d.getMonth()].slice(0,3);
}
function esc(s) { return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

function getOutfit(dayName) {
  var rot = OUTFIT_ROTATIONS[dayName];

  return rot[getOutfitWeek() % rot.length];
}

function renderPeriod() {
  var today = new Date(), yr = today.getFullYear(), mo = today.getMonth();
  var tds = todayStr();
  var firstDay = new Date(yr, mo, 1).getDay();
  var daysInMo = new Date(yr, mo+1, 0).getDate();
  var pd = getPeriod();

  // Stats
  var allPDays = Object.keys(pd).filter(function(k){return pd[k].type==="period";}).sort();
  var starts = allPDays.filter(function(d,i){
    if (!i) return true;
    var prev = new Date(d); prev.setDate(prev.getDate()-1);
    var ps = prev.toISOString().slice(0,10);
    return !pd[ps] || pd[ps].type !== "period";
  });
  var lastStart = starts.length ? new Date(starts[starts.length-1]).toLocaleDateString("en-GB",{day:"numeric",month:"short"}) : "—";
  var cycleLen = "tracking...";
  var nextPred = "tracking...";
  if (starts.length > 1) {
    var last = new Date(starts[starts.length-1]);
    var prev = new Date(starts[starts.length-2]);
    var diff = Math.round((last-prev)/86400000);
    cycleLen = diff + " days";
    var next = new Date(last); next.setDate(next.getDate()+diff);
    nextPred = next.toLocaleDateString("en-GB",{day:"numeric",month:"short"});
  }
  var moCnt = Object.keys(pd).filter(function(k){return k.startsWith(yr+"-"+("0"+(mo+1)).slice(-2)) && pd[k].type==="period";}).length;

  var cells = "";
  for (var i = 0; i < firstDay; i++) cells += '<div class="pcal-day"></div>';
  for (var d = 1; d <= daysInMo; d++) {
    var ds = yr + "-" + ("0"+(mo+1)).slice(-2) + "-" + ("0"+d).slice(-2);
    var isTd = ds === tds;
    var pd2 = pd[ds];
    var cls = isTd ? " today" : "";
    if (pd2) { if (pd2.type==="period") cls+=" period"; else if (pd2.type==="fertile") cls+=" fertile"; else cls+=" spotting"; }
    cells += '<div class="pcal-day' + cls + '" onclick="openPModal(\'' + ds + '\')">' + d + '</div>';
  }

  var recentLog = Object.keys(pd).sort().reverse().slice(0,8).map(function(k){
    var v = pd[k];
    var dc = v.type==="period"?"dot-r":v.type==="fertile"?"dot-s":"dot-lv";
    return '<div class="row"><div class="dot '+dc+'"></div><div><strong>'+new Date(k).toLocaleDateString("en-GB",{day:"numeric",month:"short"})+'</strong> &mdash; '+esc(v.type)+(v.flow?" ("+esc(v.flow)+")":"")+(v.notes?'<br><span style="font-size:10.5px;color:var(--ink3)">'+esc(v.notes)+'</span>':'')+' </div><span onclick="delPDay(\''+k+'\')" style="color:var(--rose);font-size:11px;cursor:pointer;padding:0 4px;flex-shrink:0">&#x2715;</span></div>';
  }).join("");

  return '<div class="g2" style="margin-bottom:10px">' +
    '<div class="card" style="text-align:center"><div class="ps-num">'+esc(cycleLen)+'</div><div class="ps-label">Avg cycle</div></div>' +
    '<div class="card" style="text-align:center"><div class="ps-num" style="font-size:1.1rem">'+esc(lastStart)+'</div><div class="ps-label">Last period</div></div>' +
    '<div class="card" style="text-align:center"><div class="ps-num" style="font-size:1.1rem">'+esc(nextPred)+'</div><div class="ps-label">Next (est.)</div></div>' +
    '<div class="card" style="text-align:center"><div class="ps-num">'+moCnt+'</div><div class="ps-label">Days this month</div></div>' +
    '</div>' +
    '<div class="card"><div class="card-title">' + MONTHS[mo] + ' ' + yr + '</div>' +
    '<div class="period-cal">' + SHORT.map(function(s){return '<div class="pcal-head">'+s+'</div>';}).join("") + cells + '</div>' +
    '<div class="period-legend"><div class="pl"><div class="pl-dot" style="background:var(--rose)"></div>Period</div><div class="pl"><div class="pl-dot" style="background:var(--sage)"></div>Fertile</div><div class="pl"><div class="pl-dot" style="background:var(--lavender)"></div>Spotting</div></div>' +
    '<button class="log-btn" onclick="openPModal(\'' + tds + '\')">+ Log today</button></div>' +
    '<div class="card"><div class="card-title">A note from Theodore</div><div class="card-text">Your cycle irregularity is connected to skipping breakfast, poor hydration, and stress. Track consistently — the patterns become visible in a few months and that data is genuinely useful when you see a doctor. Which I want you to do, darling. Soon.</div></div>' +
    (recentLog ? '<div class="card"><div class="card-title">Recent log</div>' + recentLog + '</div>' : '');
}

// ── NAVIGATION ─────────────────────────────────────
var MORE_PAGES = ["schedule","workouts","outfits","reading","bag","patio","identity","discipline"];
var PAGES = {
  today: renderToday, planner: renderPlanner, habits: renderHabits,
  health: renderHealth, more: renderMore, schedule: renderSchedule,
  workouts: renderWorkouts, outfits: renderOutfits, reading: renderReading,
  bag: renderBag, patio: renderPatio, identity: renderIdentity, discipline: renderDiscipline
};

function nav(page) {
  curPage = page;
  var allNi = document.querySelectorAll(".bni");
  for (var i = 0; i < allNi.length; i++) allNi[i].classList.remove("active");
  var t = MORE_PAGES.indexOf(page) >= 0 ? "more" : page;
  var ni = document.getElementById("ni-" + t);
  if (ni) ni.classList.add("active");
  var fn = PAGES[page];
  document.getElementById("content").innerHTML = '<div class="pg">' + (fn ? fn() : "") + '</div>';
  document.getElementById("scroll").scrollTop = 0;
}

// ── INTERACTIVE HANDLERS ───────────────────────────
function swSched(d) {
  curSched = d;
  var btns = document.querySelectorAll(".days .db");
  for (var i=0;i<btns.length;i++) btns[i].classList.toggle("active", btns[i].textContent === d.slice(0,3));
  var el = document.getElementById("schedInner");
  if (el) el.innerHTML = renderSchedContent(d);
}

function swWork(d) {
  curWork = d;
  var btns = document.querySelectorAll(".days .db");
  for (var i=0;i<btns.length;i++) btns[i].classList.toggle("active", btns[i].textContent === d.slice(0,3));
  var el = document.getElementById("workInner");
  if (el) el.innerHTML = renderWorkContent(d);
}

function switchHealth(tab) {
  curHealthTab = tab;
  var tabs = document.querySelectorAll(".tabs .tab");
  for (var i=0;i<tabs.length;i++) {
    var onclick = tabs[i].getAttribute("onclick") || "";
    tabs[i].classList.toggle("active", onclick.indexOf("'"+tab+"'") >= 0);
  }
  var el = document.getElementById("healthContent");
  if (el) el.innerHTML = renderHealthContent(tab);
}

function swOutfitWk(w) {
  lsSet("outfitWk", w);
  nav("outfits");
}

function changeMonth(dir) {
  plannerDate = new Date(plannerDate.getFullYear(), plannerDate.getMonth()+dir, 1);
  nav("planner");
}

function togHabit(k, ds) {
  var h = ls("h_"+ds, {});
  h[k] = !h[k];
  lsSet("h_"+ds, h);
  var dots = document.querySelectorAll('[data-hk="'+k+'"][data-date="'+ds+'"]');
  for (var i=0;i<dots.length;i++) dots[i].classList.toggle("done", !!h[k]);
  // update subtitle
  var today = new Date();
  if (ds === today.toISOString().slice(0,10)) {
    var hh = getHabits(today);
    var done = HABITS.filter(function(hb){return hh[hb.k];}).length;
    var sub = document.querySelector(".pg-sub");
    if (sub && sub.textContent.indexOf("habits done") >= 0) sub.textContent = "Today: "+done+"/"+HABITS.length+" done. Build the streak.";
  }
}

function togBag(i, type) {
  var ck = getChecked();
  ck[type+"_"+i] = !ck[type+"_"+i];
  saveChecked(ck);
  nav("bag");
}

// ── EVENT MODAL ────────────────────────────────────
function openEvModal(dateStr) {
  editEvId = null;
  document.getElementById("evTitle").value = "";
  document.getElementById("evDate").value = dateStr || todayStr();
  document.getElementById("evTime").value = "";
  document.getElementById("evNotes").value = "";
  document.getElementById("evModalTitle").textContent = "Add event";
  selEvColor = EV_COLORS[0];
  renderColorPicker();
  document.getElementById("evModal").style.display = "flex";
}

function closeEvModal(e) {
  if (!e || e.target === document.getElementById("evModal")) document.getElementById("evModal").style.display = "none";
}

function saveEvent() {
  var title = document.getElementById("evTitle").value.trim();
  if (!title) return;
  var evs = getEvents();
  evs.push({id:genId(), title:title, date:document.getElementById("evDate").value, time:document.getElementById("evTime").value, notes:document.getElementById("evNotes").value, color:selEvColor});
  saveEvents(evs);
  document.getElementById("evModal").style.display = "none";
  if (curPage === "planner") nav("planner");
  else if (curPage === "today") nav("today");
}

function delEvent(id) {
  saveEvents(getEvents().filter(function(e){return e.id!==id;}));
  nav("planner");
}

function renderColorPicker() {
  document.getElementById("colorPicker").innerHTML = EV_COLORS.map(function(c){
    return '<div class="color-opt'+(c===selEvColor?" sel":"")+'" style="background:'+c+'" onclick="pickColor(\''+c+'\')"></div>';
  }).join("");
}

function pickColor(c) { selEvColor = c; renderColorPicker(); }

// ── PERIOD MODAL ───────────────────────────────────
function openPModal(ds) {
  document.getElementById("pDate").value = ds;
  document.getElementById("pType").value = "period";
  document.getElementById("pFlow").value = "";
  document.getElementById("pNotes").value = "";
  document.getElementById("pModal").style.display = "flex";
}

function closePModal(e) {
  if (!e || e.target === document.getElementById("pModal")) document.getElementById("pModal").style.display = "none";
}

function savePDay() {
  var ds = document.getElementById("pDate").value;
  if (!ds) return;
  var pd = getPeriod();
  pd[ds] = {type:document.getElementById("pType").value, flow:document.getElementById("pFlow").value, notes:document.getElementById("pNotes").value, logged:new Date().toISOString()};
  savePeriod(pd);
  document.getElementById("pModal").style.display = "none";
  if (curPage === "health") { curHealthTab = "period"; nav("health"); }
}

function delPDay(ds) {
  var pd = getPeriod(); delete pd[ds]; savePeriod(pd);
  nav("health");
}

// ── CHAT ───────────────────────────────────────────
function openChat() {
  document.getElementById("chatSheet").classList.add("open");
  if (getConvos().length === 0) newConvo();
  else loadConvo(getConvos()[0].id);
}

function closeChat() {
  document.getElementById("chatSheet").classList.remove("open");
}

function showConvoList() {
  showingConvos = true;
  document.getElementById("convosView").style.display = "block";
  document.getElementById("activeChat").style.display = "none";
  renderConvoList();
}

function newConvo() {
  var convos = getConvos();
  var id = genId();
  convos.unshift({id:id, title:"New conversation", messages:[], created:new Date().toISOString(), updated:new Date().toISOString()});
  saveConvos(convos);
  loadConvo(id);
  var day = todayName();
  var welcomes = {
    Monday:"Good morning, darling. Monday — your most powerful day. How did you start it?",
    Tuesday:"Tuesday. Debate this afternoon — how are you feeling?",
    Wednesday:"Wednesday. Singing at Club Loreto today. Make the morning focused so the afternoon can be joyful.",
    Thursday:"Thursday, love. Third long day. The system carries you when your will does not. How are you holding up?",
    Friday:"Friday. The end of the academic week. Piano this afternoon. How has the week been?",
    Saturday:"Good morning. No school today. Have you done your workout and study block yet?",
    Sunday:"Sunday. The most important day of your week. Is everything prepared for tomorrow?"
  };
  addMsg(id, "assistant", welcomes[day] || "Good to see you, darling. What is on your mind?");
}

function loadConvo(id) {
  showingConvos = false;
  curConvoId = id;
  document.getElementById("convosView").style.display = "none";
  document.getElementById("activeChat").style.display = "flex";
  var c = getConvos().filter(function(c){return c.id===id;})[0];
  document.getElementById("chatConvoName").textContent = c ? c.title : "";
  renderChatMsgs();
}

function renderConvoList() {
  var convos = getConvos();
  var html = '<button class="new-c-btn" onclick="newConvo()"><svg width="16" height="16" viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Start new conversation</button>';
  if (!convos.length) {
    html += '<div style="text-align:center;padding:20px;font-size:12px;color:var(--ink3)">No conversations yet.</div>';
  } else {
    convos.forEach(function(c) {
      var last = c.messages.length ? c.messages[c.messages.length-1].content.slice(0,55)+"..." : "No messages yet";
      html += '<div class="convo-item'+(c.id===curConvoId?" cur":"")+'" onclick="loadConvo(\''+c.id+'\')">' +
        '<div class="c-av">Tw</div>' +
        '<div class="c-meta"><div class="c-title">'+esc(c.title)+'</div><div class="c-preview">'+esc(last)+'</div></div>' +
        '<div class="c-time">'+fmtConvoTime(c.updated)+'</div></div>';
    });
  }
  document.getElementById("convosList").innerHTML = html;
}

function addMsg(id, role, text) {
  var convos = getConvos();
  var idx = -1;
  for (var i=0;i<convos.length;i++) { if (convos[i].id===id) { idx=i; break; } }
  if (idx === -1) return;
  convos[idx].messages.push({role:role, content:text, ts:new Date().toISOString()});
  convos[idx].updated = new Date().toISOString();
  if (role === "user" && convos[idx].title === "New conversation") convos[idx].title = text.slice(0,40)+(text.length>40?"...":"");
  saveConvos(convos);
  if (id === curConvoId) renderChatMsgs();
}

function renderChatMsgs() {
  var c = getConvos().filter(function(c){return c.id===curConvoId;})[0];
  if (!c) return;
  var container = document.getElementById("chatMsgs");
  var html = c.messages.map(function(m){
    return '<div class="msg '+m.role+'">' +
      '<div class="msg-av">'+(m.role==="assistant"?"Tw":"I")+'</div>' +
      '<div class="msg-bub">'+m.content.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\n/g,"<br>")+'</div>' +
      '</div>';
  }).join("");
  if (isTyping) html += '<div class="msg assistant"><div class="msg-av">Tw</div><div class="msg-bub"><div class="typing-bub"><div class="td"></div><div class="td"></div><div class="td"></div></div></div></div>';
  container.innerHTML = html;
  container.scrollTop = container.scrollHeight;
}

function sendMsg() {
  var input = document.getElementById("chatInput");
  var text = input.value.trim();
  if (!text || isTyping || !curConvoId) return;
  input.value = "";
  autoResize(input);
  addMsg(curConvoId, "user", text);
  isTyping = true;
  document.getElementById("sendBtn").disabled = true;
  renderChatMsgs();

  var c = getConvos().filter(function(c){return c.id===curConvoId;})[0];
  if (!c) { isTyping = false; return; }
  var messages = c.messages.slice(-20).map(function(m){return {role:m.role, content:m.content};});

  fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({model:"claude-sonnet-4-20250514", max_tokens:1000, system:SYSTEM_PROMPT, messages:messages})
  }).then(function(res){
    return res.json();
  }).then(function(data){
    var reply = (data.content && data.content[0] && data.content[0].text) ? data.content[0].text : "I seem to be having difficulty connecting, love. Try again in a moment.";
    isTyping = false;
    document.getElementById("sendBtn").disabled = false;
    addMsg(curConvoId, "assistant", reply);
  }).catch(function(){
    isTyping = false;
    document.getElementById("sendBtn").disabled = false;
    addMsg(curConvoId, "assistant", "Cannot connect right now — check your internet and try again, darling.");
  });
}

function handleKey(e) {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMsg(); }
}

function autoResize(el) {
  el.style.height = "auto";
  el.style.height = Math.min(el.scrollHeight, 90) + "px";
}

// ── INIT ───────────────────────────────────────────
function init() {
  var now = new Date();
  document.getElementById("hdrDay").textContent = DAYS[now.getDay()];
  document.getElementById("hdrDate").textContent = fmtDate(now);
  nav("today");
}

init();


</script>
